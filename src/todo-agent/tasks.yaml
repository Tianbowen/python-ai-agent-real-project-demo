# tasks.yaml
# 业务地图： 定义【主题 -> 任务 -> 工具】 映射关系
# 
# 上下文工程引擎读取此文件，构建意图识别 Prompt
# 当需要新增业务能力时，只需在这里添加配置即可

biz_codes:
  agents:

    settings:
      default_model: deepseek-chat
      history_max_turns: 10
      timeout_s: 30

    topics:
      # 主题1：代办查询
      - name: 待办查询
        description: 用户想查看，搜索自己的待办事项，任务列表
        examples:
          - 我有什么代办
          - 查一下今天的任务
          - 有哪些未完成的事情

        tasks:
          - name: 查询所有代办
            description: 列出用户的所有待办事项
            tool: get_todos
            examples:
              - 我的代办列表
              - 所有任务
              - 帮我看看有什么事

          - name: 查询今日代办
            description: 只查询今天需要完成的任务
            tool: get_today_todos
            examples:
              - 今天要做什么
              - 今天的任务
              - 今日代办

          - name: 按条件查询
            tool: query_todos
            description: 按优先级，状态，日期范围筛选任务
            examples:
              - 明天有什么任务
              - 查一下后天的待办
              - 有哪些高优先级任务
              - 还有哪些没完成的
              - 2026-07-10 有什么安排
            slots:
              - code: priority
                name: 优先级
                required: false
                options: ["高", "中", "低"]
              - code: status
                name: 完成状态
                required: false
                options: ["未完成", "已完成"]
              - code: date_range
                name: 日期范围
                required: false

      - name: 任务操作
        description: 用户想创建，修改，完成或删除某个任务
        examples:
          - 帮我添加一个任务
          - 我完成了那个会议
          - 把买菜删掉
        tasks:
          - name: 创建任务
            description: 新建一个代办事项，需要标题和可选的截止时间
            tool: create_todo
            slots:
              - code: title
                name: 任务标题
                required: true,
                examples: ["开周会", "买菜", "写报告"]
              - code: due_date
                name: 截至日期
                required: false,
                examples: ["今天", "明天下午3点", "2026-07-02"]
              - code: priority
                name: 优先级
                required: false
                examples: ["高","中","低"]

          - name: 完成任务
            description: 标记某个任务为已完成
            tool: complete_todo
            slots:
              - code: title
                name: 任务标题
                required: true

          - name: 修改任务
            tool: update_todo
            description: 更新某个待办事项
            slots:
              - code: title
                name: 原任务标题
                required: true
              - code: new_title
                name: 新标题
                required: false
              - code: new_due_date
                name: 新截止日期
                required: false
              - code: new_priority
                name: 新优先级
                required: false
          
          - name: 删除任务
            tool: delete_todo
            confirm: true
            slots:
              - code: title
                name: 任务标题
                required: true

          - name: 批量完成任务
            tool: batch_complete_todo
            description: 把符合条件的多个任务批量标记为完成
            slots:
              - code: priority
                name: 优先级筛选
                required: false

          - name: 今日摘要
            tool: daily_summary
            description: 生成今日工作摘要和完成统计

          - name: 智能完成或创建
            tool: smart_todo
            description: 完成任务

      - name: 统计分析
        description: 查看任务完成情况，进度统计
        task:
          - name: 今日完成统计
            tool: stats_today
          - name: 本周进度统计
            tool: stats_week       
      
      - name: 通用咨询

        description: 其他与日期，时间管理相关的通用问题
        examples:
          - 怎么用这个助手
          - 今天是星期几
          - 帮我规划一个时间

        tasks:
          - name: 通用问答
            description: 回答各种通用的日程管理问题
            tool: get_other
            examples:
              - 如何提高效率
              - 怎么安排工作
  hr:
    topics:
      - name: 假期管理
        tasks:
          - name: 查询剩余假期
            tool: query_leave
          - name: 申请假期
            tool: apply_leave
            confirm: true